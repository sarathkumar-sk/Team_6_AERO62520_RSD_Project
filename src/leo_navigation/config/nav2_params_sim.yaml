bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    filter_duration: 0.3
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    service_introspection_mode: disabled

    navigators: ["navigate_to_pose", "navigate_through_poses"]

    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
      enable_groot_monitoring: false
      groot_server_port: 1667

    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
      enable_groot_monitoring: false
      groot_server_port: 1669


controller_server:
  ros__parameters:
    use_sim_time: true
    odom_topic: /odom
    enable_stamped_cmd_vel: false
    controller_frequency: 20.0

    min_x_velocity_threshold: 0.0001
    min_y_velocity_threshold: 0.0001
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.3

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.1
      required_movement_angle: 0.25
      movement_time_allowance: 5.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: false
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true

      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.24
      max_vel_y: 0.0
      max_vel_theta: 0.55

      min_speed_xy: 0.02
      max_speed_xy: 0.24
      min_speed_theta: 0.02

      acc_lim_x: 0.65
      acc_lim_y: 0.0
      acc_lim_theta: 1.2
      decel_lim_x: -0.65
      decel_lim_y: 0.0
      decel_lim_theta: -1.2

      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 20

      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.20
      trans_stopped_velocity: 0.02

      short_circuit_trajectory_evaluation: true
      limit_vel_cmd_in_traj: false
      stateful: true

      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]

      BaseObstacle.scale: 0.30
      PathAlign.scale: 24.0
      GoalAlign.scale: 12.0
      PathDist.scale: 24.0
      GoalDist.scale: 12.0
      RotateToGoal.scale: 24.0
      RotateToGoal.slowing_factor: 2.0
      RotateToGoal.lookahead_time: -1.0
      PathAlign.forward_point_distance: 0.25
      GoalAlign.forward_point_distance: 0.25


planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      use_astar: true
      allow_unknown: false
      tolerance: 0.25


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true

      global_frame: map
      robot_base_frame: base_footprint
      transform_tolerance: 0.5

      rolling_window: false
      track_unknown_space: true
      always_send_full_costmap: true

      height: 20
      width: 20
      origin_x: -10.0
      origin_y: -10.0
      resolution: 0.05

      footprint_padding: 0.01
      footprint: "[[0.22, 0.22], [0.22, -0.22], [-0.22, -0.22], [-0.22, 0.22]]"

      publish_frequency: 1.0
      update_frequency: 1.0

      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /map
        map_subscribe_transient_local: true
        enabled: true
        subscribe_to_updates: true
        transform_tolerance: 0.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.33


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true

      global_frame: odom
      robot_base_frame: base_footprint
      transform_tolerance: 0.5

      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05

      track_unknown_space: false
      always_send_full_costmap: true

      footprint_padding: 0.01
      footprint: "[[0.22, 0.22], [0.22, -0.22], [-0.22, -0.22], [-0.22, 0.22]]"

      update_frequency: 6.0
      publish_frequency: 3.0

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: scan
        combination_method: 1

        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 10.0
          raytrace_min_range: 0.15
          obstacle_max_range: 10.0
          obstacle_min_range: 0.15

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.33


behavior_server:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    enable_stamped_cmd_vel: false

    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0

    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"

    backup:
      plugin: "nav2_behaviors::BackUp"

    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"

    wait:
      plugin: "nav2_behaviors::Wait"


waypoint_follower:
  ros__parameters:
    use_sim_time: true
    stop_on_failure: true
    loop_rate: 10
    waypoint_task_executor_plugin: wait_at_waypoint

    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 1000


lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0

    node_names:
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
