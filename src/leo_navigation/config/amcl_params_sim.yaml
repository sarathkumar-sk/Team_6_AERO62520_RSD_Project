amcl:
  ros__parameters:
    use_sim_time: true

    global_frame_id: map
    odom_frame_id: odom
    base_frame_id: base_footprint

    scan_topic: /scan

    set_initial_pose: false

    min_particles: 500
    max_particles: 2000
    kld_err: 0.05
    kld_z: 0.99

    update_min_d: 0.10
    update_min_a: 0.10

    resample_interval: 1
    transform_tolerance: 1.0

    laser_min_range: 0.15
    laser_max_range: 10.0
    max_beams: 60

    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    robot_model_type: nav2_amcl::DifferentialMotionModel

    laser_model_type: likelihood_field
    laser_likelihood_max_dist: 2.0

    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1
